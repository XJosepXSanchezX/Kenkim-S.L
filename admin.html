<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin — Otitanuz Group</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --midnight:#1A1F2E; --amber:#C9995A; --cream:#F7F5F0; --text:#2C2C2C; --muted:#888; --border:#E2DDD6; --bg:#EDEAE5; --success:#4A7C6F; --danger:#C0392B; }
        * { box-sizing:border-box; margin:0; padding:0; }
        body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

        /* LOGIN */
        .login-screen { min-height:100vh; display:flex; align-items:center; justify-content:center; background:var(--midnight); }
        .login-box { background:var(--cream); padding:2.5rem; border-radius:8px; width:100%; max-width:340px; text-align:center; }
        .login-box h1 { font-family:'Playfair Display',serif; font-size:1.5rem; font-weight:400; color:var(--midnight); margin-bottom:.25rem; }
        .login-box .eyebrow { font-size:.68rem; letter-spacing:.2em; text-transform:uppercase; color:var(--muted); margin-bottom:2rem; }
        .login-box input { width:100%; padding:.75rem 1rem; border:1px solid var(--border); border-radius:4px; font-family:'Inter',sans-serif; font-size:.9rem; margin-bottom:.75rem; text-align:center; }
        .login-box input:focus { outline:none; border-color:var(--amber); }
        .login-btn { width:100%; padding:.8rem; background:var(--midnight); color:white; border:none; border-radius:4px; font-family:'Inter',sans-serif; font-size:.78rem; letter-spacing:.12em; text-transform:uppercase; cursor:pointer; }
        .login-btn:hover { background:#2d3348; }
        .login-error { color:var(--danger); font-size:.8rem; margin-top:.6rem; min-height:1.2em; }

        /* NAV */
        .admin-main { display:none; }
        .admin-nav { background:var(--midnight); padding:1rem 1.5rem; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:10; border-bottom:2px solid var(--amber); }
        .nav-brand { font-family:'Playfair Display',serif; color:var(--cream); font-size:1.1rem; font-weight:400; }
        .nav-brand small { display:block; font-family:'Inter',sans-serif; font-size:.62rem; letter-spacing:.18em; text-transform:uppercase; color:var(--amber); margin-top:1px; }
        .nav-right { display:flex; gap:.6rem; align-items:center; }
        .nav-btn { padding:.45rem .85rem; border-radius:4px; cursor:pointer; font-size:.78rem; font-family:'Inter',sans-serif; transition:background .2s; }
        .btn-refresh { background:rgba(255,255,255,.1); border:none; color:white; }
        .btn-refresh:hover { background:rgba(255,255,255,.2); }
        .btn-logout { background:transparent; border:1px solid rgba(255,255,255,.2); color:rgba(255,255,255,.6); }
        .btn-logout:hover { border-color:rgba(255,255,255,.5); color:white; }

        /* MAIN TABS */
        .main-tabs { display:flex; gap:0; border-bottom:2px solid var(--border); background:white; }
        .main-tab { padding:.9rem 1.5rem; border:none; background:transparent; font-family:'Inter',sans-serif; font-size:.82rem; font-weight:500; color:var(--muted); cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-2px; transition:all .15s; }
        .main-tab:hover { color:var(--midnight); }
        .main-tab.active { color:var(--midnight); border-bottom-color:var(--midnight); }

        .admin-container { max-width:1200px; margin:0 auto; padding:1.5rem; }
        .view-section { display:none; }
        .view-section.active { display:block; }

        /* ── CALENDARIO ── */
        .cal-wrapper { background:white; border-radius:12px; overflow:hidden; margin-bottom:1.5rem; }
        .cal-nav { background:var(--midnight); padding:1rem 1.25rem; display:flex; align-items:center; gap:.75rem; }
        .cal-nav-btn { background:rgba(255,255,255,.1); border:none; color:white; width:34px; height:34px; border-radius:8px; cursor:pointer; font-size:.9rem; transition:background .15s; }
        .cal-nav-btn:hover { background:rgba(255,255,255,.22); }
        .cal-title { flex:1; text-align:center; color:white; font-family:'Playfair Display',serif; font-size:1.1rem; }
        .cal-today-btn { background:rgba(255,255,255,.1); border:none; color:white; padding:.35rem .85rem; border-radius:6px; cursor:pointer; font-size:.75rem; font-family:'Inter',sans-serif; }
        .cal-today-btn:hover { background:rgba(255,255,255,.2); }
        .cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:1px; background:var(--border); border-top:1px solid var(--border); }
        .cal-dow { background:#FAFAF8; text-align:center; padding:.6rem 0; font-size:.6rem; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); font-weight:500; }
        .cal-cell { background:white; min-height:76px; padding:.5rem; cursor:pointer; transition:background .15s; display:flex; flex-direction:column; align-items:center; gap:3px; }
        .cal-cell.empty { background:#FAFAF8; cursor:default; min-height:76px; }
        .cal-cell.past { background:#FDFDFC; }
        .cal-cell.past .cal-num { color:#bbb; }
        .cal-cell:not(.empty):not(.past):hover { background:var(--cream); }
        .cal-num { font-size:.85rem; font-weight:500; color:var(--text); width:28px; height:28px; display:flex; align-items:center; justify-content:center; border-radius:50%; flex-shrink:0; }
        .cal-cell.today .cal-num { background:var(--midnight); color:white; }
        .cal-cell.selected .cal-num { background:var(--amber); color:white; }
        .cal-count { font-size:.62rem; color:var(--muted); font-weight:600; }
        .cal-dots { display:flex; gap:3px; flex-wrap:wrap; justify-content:center; }
        .cal-dot { width:6px; height:6px; border-radius:50%; }

        /* Day panel */
        .day-panel { background:white; border-radius:12px; overflow:hidden; margin-bottom:1.5rem; }
        .day-panel-header { padding:1rem 1.25rem; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
        .day-panel-title { font-family:'Playfair Display',serif; font-size:1rem; font-weight:400; color:var(--midnight); }
        .day-panel-count { background:var(--midnight); color:white; font-size:.68rem; padding:.2rem .65rem; border-radius:99px; }
        .res-card { display:flex; gap:1rem; padding:1rem 1.25rem; border-bottom:1px solid #F0EDE8; align-items:flex-start; }
        .res-card:last-child { border-bottom:none; }
        .res-time { font-size:1rem; font-weight:600; color:var(--midnight); min-width:48px; padding-top:2px; }
        .res-info { flex:1; }
        .res-name { font-weight:500; color:var(--midnight); font-size:.9rem; }
        .res-meta { font-size:.78rem; color:var(--muted); margin-top:3px; line-height:1.5; }
        .res-actions { display:flex; gap:.35rem; flex-wrap:wrap; margin-top:.5rem; }
        .day-empty { padding:2.5rem; text-align:center; color:var(--muted); font-size:.875rem; }

        /* ── RESERVAS / HISTÓRICO ── */
        .stats-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:1rem; margin-bottom:1.5rem; }
        .stat-card { background:white; border-radius:8px; padding:1.25rem; border-left:3px solid var(--border); }
        .stat-card.c1 { border-left-color:var(--amber); }
        .stat-card.c2 { border-left-color:#7B9EC4; }
        .stat-card.c3 { border-left-color:var(--success); }
        .stat-card.c4 { border-left-color:#E6A817; }
        .stat-card.c5 { border-left-color:var(--danger); }
        .stat-label { font-size:.62rem; letter-spacing:.15em; text-transform:uppercase; color:var(--muted); margin-bottom:.4rem; }
        .stat-value { font-size:2.2rem; font-weight:600; color:var(--midnight); line-height:1; }

        .resto-tabs { display:flex; gap:.5rem; flex-wrap:wrap; margin-bottom:1rem; }
        .resto-tab { padding:.45rem 1rem; border-radius:99px; border:2px solid var(--border); cursor:pointer; font-family:'Inter',sans-serif; font-size:.78rem; font-weight:500; transition:all .15s; background:white; color:var(--muted); }
        .resto-tab:hover { color:var(--midnight); border-color:var(--midnight); }
        .resto-tab.active { color:white; border-color:transparent; }
        .resto-tab[data-r=""].active    { background:var(--midnight); }
        .resto-tab[data-r="Otitanuz Bar"].active   { background:#C9995A; }
        .resto-tab[data-r="La Hoguera"].active     { background:#C94A1A; }
        .resto-tab[data-r="Otitanuz Beach"].active { background:#1A8FA0; }

        .filters { background:white; border-radius:8px; padding:1rem 1.25rem; display:flex; gap:1rem; align-items:center; flex-wrap:wrap; margin-bottom:1rem; }
        .filter-group { display:flex; align-items:center; gap:.5rem; }
        .filter-group label { font-size:.68rem; text-transform:uppercase; letter-spacing:.1em; color:var(--muted); white-space:nowrap; }
        .filters input,.filters select { padding:.45rem .75rem; border:1px solid var(--border); border-radius:4px; font-family:'Inter',sans-serif; font-size:.85rem; color:var(--text); }
        .filters input:focus,.filters select:focus { outline:none; border-color:var(--amber); }
        .btn-clear { padding:.45rem .85rem; border:1px solid var(--border); border-radius:4px; background:transparent; cursor:pointer; font-size:.78rem; font-family:'Inter',sans-serif; color:var(--muted); }
        .btn-clear:hover { color:var(--midnight); border-color:var(--midnight); }

        .table-card { background:white; border-radius:8px; overflow:hidden; }
        .table-header { padding:1rem 1.25rem; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
        .table-title { font-family:'Playfair Display',serif; font-size:1rem; font-weight:400; color:var(--midnight); }
        .count-badge { background:var(--midnight); color:white; font-size:.68rem; padding:.2rem .65rem; border-radius:99px; font-weight:500; }
        table { width:100%; border-collapse:collapse; }
        th { font-size:.62rem; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); text-align:left; padding:.75rem 1rem; border-bottom:1px solid var(--border); background:#FAFAF8; font-weight:500; white-space:nowrap; }
        td { padding:.85rem 1rem; border-bottom:1px solid #F0EDE8; font-size:.875rem; vertical-align:middle; }
        tr:last-child td { border-bottom:none; }
        tr:hover td { background:#FAFAF8; }
        .td-name { font-weight:500; color:var(--midnight); }
        .td-sub { font-size:.78rem; color:var(--muted); margin-top:2px; }

        /* BADGES */
        .badge { display:inline-block; padding:.22rem .6rem; border-radius:99px; font-size:.68rem; font-weight:500; }
        .badge-pendiente  { background:#FFF3CD; color:#8A6900; }
        .badge-confirmada { background:#D4EDDA; color:#1E5C3A; }
        .badge-cancelada  { background:#FAE0E0; color:#8B1E1E; }
        .badge-asistio    { background:#D4EDDA; color:#1E5C3A; }
        .badge-no_asistio { background:#FFE8D6; color:#8A3A00; }
        .rbadge { display:inline-block; padding:.2rem .55rem; border-radius:4px; font-size:.65rem; font-weight:600; white-space:nowrap; }
        .rbadge-bar   { background:#FFF0DC; color:#8A5A00; }
        .rbadge-hog   { background:#FFE8E0; color:#8A2000; }
        .rbadge-beach { background:#DFF4F7; color:#005F6E; }

        /* ACTION BUTTONS */
        .action-btn { padding:.28rem .6rem; border:1px solid var(--border); border-radius:4px; background:transparent; cursor:pointer; font-size:.68rem; font-family:'Inter',sans-serif; color:var(--text); transition:all .15s; white-space:nowrap; }
        .action-btn:hover           { background:var(--midnight); color:white; border-color:var(--midnight); }
        .action-btn.btn-confirm:hover { background:var(--success); color:white; border-color:var(--success); }
        .action-btn.btn-cancel:hover  { background:var(--danger);  color:white; border-color:var(--danger); }
        .action-btn.btn-asistio:hover { background:#2E7D32; color:white; border-color:#2E7D32; }
        .action-btn.btn-noasistio:hover { background:#E65100; color:white; border-color:#E65100; }
        .actions-cell { display:flex; gap:.35rem; flex-wrap:wrap; }
        .state-msg { text-align:center; padding:3rem; color:var(--muted); font-size:.875rem; }

        @media (max-width:640px) {
            table,thead,tbody,th,td,tr { display:block; }
            thead tr { display:none; }
            td { padding:.4rem 1rem; border-bottom:none; font-size:.85rem; }
            td::before { content:attr(data-label); font-size:.6rem; text-transform:uppercase; letter-spacing:.1em; color:var(--muted); display:block; margin-bottom:2px; }
            tr { border-bottom:1px solid var(--border); padding:.75rem 0; }
            tr:last-child { border-bottom:none; }
            .cal-cell { min-height:52px; padding:.3rem; }
            .cal-num { width:22px; height:22px; font-size:.75rem; }
        }
    </style>
</head>
<body>

<div class="login-screen" id="login-screen">
    <div class="login-box">
        <h1>Panel Admin</h1>
        <p class="eyebrow">Otitanuz Group · Reservas</p>
        <input type="password" id="pwd-input" placeholder="Contraseña" onkeydown="if(event.key==='Enter')checkLogin()">
        <button class="login-btn" onclick="checkLogin()">Entrar al panel</button>
        <p class="login-error" id="login-error"></p>
    </div>
</div>

<div class="admin-main" id="admin-main">
    <nav class="admin-nav">
        <div class="nav-brand">Otitanuz Group<small>Panel de reservas</small></div>
        <div class="nav-right">
            <button class="nav-btn btn-refresh" onclick="loadReservations()">↻ Actualizar</button>
            <button class="nav-btn btn-logout" onclick="logout()">Salir</button>
        </div>
    </nav>

    <!-- MAIN TABS -->
    <div class="main-tabs">
        <button class="main-tab active" onclick="switchView('calendario')">📅 Calendario</button>
        <button class="main-tab" onclick="switchView('reservas')">📋 Reservas</button>
        <button class="main-tab" onclick="switchView('historico')">🕐 Histórico</button>
    </div>

    <div class="admin-container">

        <!-- ── CALENDARIO ── -->
        <div id="view-calendario" class="view-section active">
            <div class="cal-wrapper">
                <div class="cal-nav">
                    <button class="cal-nav-btn" onclick="calNav(-1)">◀</button>
                    <span class="cal-title" id="cal-title"></span>
                    <button class="cal-nav-btn" onclick="calNav(1)">▶</button>
                    <button class="cal-today-btn" onclick="calGoToday()">Hoy</button>
                </div>
                <div id="cal-grid" class="cal-grid"></div>
            </div>
            <div class="day-panel" id="day-panel">
                <div class="day-panel-header">
                    <span class="day-panel-title" id="day-panel-title">Selecciona un día para ver sus reservas</span>
                    <span class="day-panel-count" id="day-panel-count" style="display:none"></span>
                </div>
                <div id="day-panel-body"><div class="day-empty">Haz clic en cualquier día del calendario</div></div>
            </div>
        </div>

        <!-- ── RESERVAS ── -->
        <div id="view-reservas" class="view-section">
            <div class="stats-grid">
                <div class="stat-card c1"><div class="stat-label">Hoy</div><div class="stat-value" id="r-stat-today">—</div></div>
                <div class="stat-card c2"><div class="stat-label">Esta semana</div><div class="stat-value" id="r-stat-week">—</div></div>
                <div class="stat-card c3"><div class="stat-label">Confirmadas</div><div class="stat-value" id="r-stat-conf">—</div></div>
                <div class="stat-card c4"><div class="stat-label">Pendientes</div><div class="stat-value" id="r-stat-pend">—</div></div>
            </div>
            <div class="resto-tabs">
                <button class="resto-tab active" data-r="" onclick="setResto(this)">🍽 Todos</button>
                <button class="resto-tab" data-r="Otitanuz Bar" onclick="setResto(this)">🥂 Otitanuz Bar</button>
                <button class="resto-tab" data-r="La Hoguera" onclick="setResto(this)">🔥 La Hoguera</button>
                <button class="resto-tab" data-r="Otitanuz Beach" onclick="setResto(this)">🏖 Otitanuz Beach</button>
            </div>
            <div class="filters">
                <div class="filter-group"><label>Fecha</label><input type="date" id="r-filter-date" onchange="renderReservas()"></div>
                <div class="filter-group"><label>Estado</label>
                    <select id="r-filter-status" onchange="renderReservas()">
                        <option value="">Todos</option>
                        <option value="pendiente">Pendiente</option>
                        <option value="confirmada">Confirmada</option>
                        <option value="cancelada">Cancelada</option>
                    </select>
                </div>
                <button class="btn-clear" onclick="clearRFilters()">✕ Limpiar</button>
            </div>
            <div class="table-card">
                <div class="table-header"><span class="table-title">Reservas activas</span><span class="count-badge" id="r-count">0</span></div>
                <div id="r-table-body"><div class="state-msg">Cargando…</div></div>
            </div>
        </div>

        <!-- ── HISTÓRICO ── -->
        <div id="view-historico" class="view-section">
            <div class="stats-grid">
                <div class="stat-card c3"><div class="stat-label">Total asistió</div><div class="stat-value" id="h-stat-asistio">—</div></div>
                <div class="stat-card c5"><div class="stat-label">No asistió</div><div class="stat-value" id="h-stat-noasistio">—</div></div>
            </div>
            <div class="resto-tabs">
                <button class="resto-tab active" data-rh="" onclick="setRestoH(this)">🍽 Todos</button>
                <button class="resto-tab" data-rh="Otitanuz Bar" onclick="setRestoH(this)">🥂 Otitanuz Bar</button>
                <button class="resto-tab" data-rh="La Hoguera" onclick="setRestoH(this)">🔥 La Hoguera</button>
                <button class="resto-tab" data-rh="Otitanuz Beach" onclick="setRestoH(this)">🏖 Otitanuz Beach</button>
            </div>
            <div class="filters">
                <div class="filter-group"><label>Fecha</label><input type="date" id="h-filter-date" onchange="renderHistorico()"></div>
                <button class="btn-clear" onclick="clearHFilters()">✕ Limpiar</button>
            </div>
            <div class="table-card">
                <div class="table-header"><span class="table-title">Histórico de visitas</span><span class="count-badge" id="h-count">0</span></div>
                <div id="h-table-body"><div class="state-msg">Cargando…</div></div>
            </div>
        </div>

    </div>
</div>

<script>
    var SUPABASE_URL   = 'https://axqptiwackqbtkqpylzm.supabase.co';
    var SUPABASE_KEY   = 'sb_publishable_JqZlwNT9tHPPKsIYDGurQQ_JQZeGoLd';
    var ADMIN_PASSWORD = '@Kenkim2026';

    var db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    var allReservations = [];
    var calYear  = new Date().getFullYear();
    var calMonth = new Date().getMonth();
    var selectedDay  = null;
    var activeResto  = '';
    var activeRestoH = '';
    var MONTHS = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
    var DAYS   = ['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];

    /* AUTH */
    function checkLogin() {
        if (document.getElementById('pwd-input').value === ADMIN_PASSWORD) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('admin-main').style.display = 'block';
            loadReservations();
        } else { document.getElementById('login-error').textContent = 'Contraseña incorrecta.'; }
    }
    function logout() {
        document.getElementById('login-screen').style.display = 'flex';
        document.getElementById('admin-main').style.display = 'none';
        document.getElementById('pwd-input').value = '';
        document.getElementById('login-error').textContent = '';
    }

    /* TABS */
    function switchView(v) {
        document.querySelectorAll('.main-tab').forEach(function(t,i) {
            var views = ['calendario','reservas','historico'];
            t.classList.toggle('active', views[i] === v);
        });
        document.querySelectorAll('.view-section').forEach(function(s) { s.classList.remove('active'); });
        document.getElementById('view-' + v).classList.add('active');
    }

    /* DATA */
    async function loadReservations() {
        var result = await db.from('reservations').select('*').order('date',{ascending:true}).order('time',{ascending:true});
        if (result.error) { return; }
        allReservations = result.data || [];
        renderCalendar();
        renderReservas();
        renderHistorico();
    }

    /* CALENDAR */
    function renderCalendar() {
        var today = new Date().toISOString().split('T')[0];
        document.getElementById('cal-title').textContent = MONTHS[calMonth] + ' ' + calYear;

        var byDate = {};
        allReservations.filter(function(r) { return r.status !== 'asistio' && r.status !== 'no_asistio'; }).forEach(function(r) {
            if (!byDate[r.date]) byDate[r.date] = [];
            byDate[r.date].push(r);
        });

        var firstDow = new Date(calYear, calMonth, 1).getDay();
        var offset   = firstDow === 0 ? 6 : firstDow - 1;
        var daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
        var todayDate = new Date(); todayDate.setHours(0,0,0,0);

        var html = DAYS.map(function(d) { return '<div class="cal-dow">' + d + '</div>'; }).join('');
        for (var i = 0; i < offset; i++) html += '<div class="cal-cell empty"></div>';

        for (var d = 1; d <= daysInMonth; d++) {
            var ds = calYear + '-' + String(calMonth+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
            var reservs = byDate[ds] || [];
            var cellDate = new Date(calYear, calMonth, d);
            var isPast   = cellDate < todayDate;
            var isToday  = ds === today;
            var isSel    = ds === selectedDay;

            var barN   = reservs.filter(function(r) { return r.restaurant === 'Otitanuz Bar'; }).length;
            var hogN   = reservs.filter(function(r) { return r.restaurant === 'La Hoguera'; }).length;
            var beachN = reservs.filter(function(r) { return r.restaurant === 'Otitanuz Beach'; }).length;
            var total  = reservs.length;

            var dots = '';
            if (barN)   dots += '<span class="cal-dot" style="background:#C9995A"></span>';
            if (hogN)   dots += '<span class="cal-dot" style="background:#C94A1A"></span>';
            if (beachN) dots += '<span class="cal-dot" style="background:#1A8FA0"></span>';

            var cls = 'cal-cell' + (isPast?' past':'') + (isToday?' today':'') + (isSel?' selected':'');
            html += '<div class="' + cls + '" onclick="selectDay(\'' + ds + '\')">' +
                '<span class="cal-num">' + d + '</span>' +
                (total ? '<span class="cal-count">' + total + '</span>' : '') +
                (dots  ? '<div class="cal-dots">' + dots + '</div>' : '') +
                '</div>';
        }
        document.getElementById('cal-grid').innerHTML = html;
        if (selectedDay) renderDayPanel(selectedDay);
    }

    function calNav(dir) { calMonth += dir; if (calMonth > 11) { calMonth=0; calYear++; } if (calMonth < 0) { calMonth=11; calYear--; } renderCalendar(); }
    function calGoToday() { var n = new Date(); calYear=n.getFullYear(); calMonth=n.getMonth(); renderCalendar(); }

    function selectDay(ds) {
        selectedDay = ds;
        renderCalendar();
        renderDayPanel(ds);
    }

    function renderDayPanel(ds) {
        var dateObj = new Date(ds + 'T12:00');
        var fmt = dateObj.toLocaleDateString('es-ES', { weekday:'long', day:'numeric', month:'long' });
        fmt = fmt.charAt(0).toUpperCase() + fmt.slice(1);

        var rows = allReservations.filter(function(r) { return r.date === ds && r.status !== 'asistio' && r.status !== 'no_asistio'; });
        document.getElementById('day-panel-title').textContent = fmt;
        var countEl = document.getElementById('day-panel-count');
        if (rows.length) { countEl.textContent = rows.length + ' reserva' + (rows.length>1?'s':''); countEl.style.display=''; }
        else { countEl.style.display='none'; }

        if (!rows.length) { document.getElementById('day-panel-body').innerHTML = '<div class="day-empty">Sin reservas este día</div>'; return; }

        var html = rows.map(function(r) {
            var btns = getBtns(r);
            return '<div class="res-card">' +
                '<span class="res-time">' + r.time + '</span>' +
                '<div class="res-info">' +
                    '<div class="res-name">' + esc(r.name) + ' &nbsp;' + restoBadge(r.restaurant) + '</div>' +
                    '<div class="res-meta">📞 ' + esc(r.phone) + ' &nbsp;·&nbsp; 👥 ' + r.guests + ' personas' +
                        (r.email ? ' &nbsp;·&nbsp; ✉️ ' + esc(r.email) : '') +
                        (r.notes ? '<br>📝 ' + esc(r.notes) : '') + '</div>' +
                    '<div class="res-actions">' + btns + '</div>' +
                '</div>' +
                '<span class="badge badge-' + r.status + '">' + statusLabel(r.status) + '</span>' +
                '</div>';
        }).join('');
        document.getElementById('day-panel-body').innerHTML = html;
    }

    /* RESERVAS TAB */
    function setResto(btn) {
        document.querySelectorAll('.resto-tabs:first-of-type .resto-tab, #view-reservas .resto-tab').forEach(function(t) { t.classList.remove('active'); });
        btn.classList.add('active');
        activeResto = btn.dataset.r;
        renderReservas();
    }
    function clearRFilters() { document.getElementById('r-filter-date').value=''; document.getElementById('r-filter-status').value=''; renderReservas(); }

    function renderReservas() {
        var fd = document.getElementById('r-filter-date').value;
        var fs = document.getElementById('r-filter-status').value;
        var active = ['pendiente','confirmada','cancelada'];
        var rows = allReservations.filter(function(r) { return active.indexOf(r.status) > -1; });
        if (activeResto) rows = rows.filter(function(r) { return r.restaurant === activeResto; });
        if (fd) rows = rows.filter(function(r) { return r.date === fd; });
        if (fs) rows = rows.filter(function(r) { return r.status === fs; });

        var today = new Date().toISOString().split('T')[0];
        var weekEnd = new Date(Date.now()+7*24*60*60*1000).toISOString().split('T')[0];
        var all = allReservations.filter(function(r) { return active.indexOf(r.status) > -1; });
        document.getElementById('r-stat-today').textContent = all.filter(function(r) { return r.date===today; }).length;
        document.getElementById('r-stat-week').textContent  = all.filter(function(r) { return r.date>=today && r.date<=weekEnd; }).length;
        document.getElementById('r-stat-conf').textContent  = all.filter(function(r) { return r.status==='confirmada'; }).length;
        document.getElementById('r-stat-pend').textContent  = all.filter(function(r) { return r.status==='pendiente'; }).length;

        document.getElementById('r-count').textContent = rows.length;
        if (!rows.length) { document.getElementById('r-table-body').innerHTML='<div class="state-msg">No hay reservas con estos filtros.</div>'; return; }

        var tbRows = rows.map(function(r) {
            var ds = new Date(r.date+'T12:00').toLocaleDateString('es-ES',{weekday:'short',day:'numeric',month:'short'});
            var phone = r.phone ? '<a href="tel:'+r.phone+'" style="color:inherit;text-decoration:none">'+esc(r.phone)+'</a>' : '—';
            return '<tr>' +
                '<td data-label="Restaurante">'+restoBadge(r.restaurant)+'</td>' +
                '<td data-label="Fecha"><strong>'+ds+'</strong><div class="td-sub">'+r.time+'</div></td>' +
                '<td data-label="Cliente"><span class="td-name">'+esc(r.name)+'</span><div class="td-sub">'+phone+(r.email?' · '+esc(r.email):'')+'</div></td>' +
                '<td data-label="Pers.">'+r.guests+'</td>' +
                '<td data-label="Estado"><span class="badge badge-'+r.status+'">'+statusLabel(r.status)+'</span></td>' +
                '<td data-label="Notas">'+(r.notes?'<span style="font-size:.78rem;color:var(--muted)">'+esc(r.notes)+'</span>':'<span style="color:var(--border)">—</span>')+'</td>' +
                '<td data-label="Acciones"><div class="actions-cell">'+getBtns(r)+'</div></td>' +
                '</tr>';
        }).join('');
        document.getElementById('r-table-body').innerHTML = '<table><thead><tr><th>Restaurante</th><th>Fecha</th><th>Cliente</th><th>Pers.</th><th>Estado</th><th>Notas</th><th>Acciones</th></tr></thead><tbody>'+tbRows+'</tbody></table>';
    }

    /* HISTÓRICO TAB */
    function setRestoH(btn) {
        document.querySelectorAll('#view-historico .resto-tab').forEach(function(t) { t.classList.remove('active'); });
        btn.classList.add('active');
        activeRestoH = btn.dataset.rh;
        renderHistorico();
    }
    function clearHFilters() { document.getElementById('h-filter-date').value=''; renderHistorico(); }

    function renderHistorico() {
        var fd = document.getElementById('h-filter-date').value;
        var hist = ['asistio','no_asistio'];
        var rows = allReservations.filter(function(r) { return hist.indexOf(r.status) > -1; });
        if (activeRestoH) rows = rows.filter(function(r) { return r.restaurant === activeRestoH; });
        if (fd) rows = rows.filter(function(r) { return r.date === fd; });

        var allHist = allReservations.filter(function(r) { return hist.indexOf(r.status) > -1; });
        document.getElementById('h-stat-asistio').textContent   = allHist.filter(function(r) { return r.status==='asistio'; }).length;
        document.getElementById('h-stat-noasistio').textContent = allHist.filter(function(r) { return r.status==='no_asistio'; }).length;

        document.getElementById('h-count').textContent = rows.length;
        if (!rows.length) { document.getElementById('h-table-body').innerHTML='<div class="state-msg">El histórico está vacío.</div>'; return; }

        var tbRows = rows.map(function(r) {
            var ds = new Date(r.date+'T12:00').toLocaleDateString('es-ES',{weekday:'short',day:'numeric',month:'short'});
            var phone = r.phone ? '<a href="tel:'+r.phone+'" style="color:inherit;text-decoration:none">'+esc(r.phone)+'</a>' : '—';
            return '<tr>' +
                '<td data-label="Restaurante">'+restoBadge(r.restaurant)+'</td>' +
                '<td data-label="Fecha"><strong>'+ds+'</strong><div class="td-sub">'+r.time+'</div></td>' +
                '<td data-label="Cliente"><span class="td-name">'+esc(r.name)+'</span><div class="td-sub">'+phone+'</div></td>' +
                '<td data-label="Pers.">'+r.guests+'</td>' +
                '<td data-label="Estado"><span class="badge badge-'+r.status+'">'+statusLabel(r.status)+'</span></td>' +
                '<td data-label="Notas">'+(r.notes?'<span style="font-size:.78rem;color:var(--muted)">'+esc(r.notes)+'</span>':'—')+'</td>' +
                '</tr>';
        }).join('');
        document.getElementById('h-table-body').innerHTML = '<table><thead><tr><th>Restaurante</th><th>Fecha</th><th>Cliente</th><th>Pers.</th><th>Estado</th><th>Notas</th></tr></thead><tbody>'+tbRows+'</tbody></table>';
    }

    /* STATUS */
    function getBtns(r) {
        var btns = '';
        if (r.status === 'pendiente')  btns += '<button class="action-btn btn-confirm" onclick="chSt(\''+r.id+'\',\'confirmada\')">✓ Confirmar</button>';
        if (r.status === 'confirmada') btns += '<button class="action-btn btn-asistio" onclick="chSt(\''+r.id+'\',\'asistio\')">✅ Asistió</button><button class="action-btn btn-noasistio" onclick="chSt(\''+r.id+'\',\'no_asistio\')">❌ No asistió</button>';
        if (r.status !== 'cancelada')  btns += '<button class="action-btn btn-cancel" onclick="chSt(\''+r.id+'\',\'cancelada\')">✗ Cancelar</button>';
        if (r.status === 'cancelada')  btns += '<button class="action-btn" onclick="chSt(\''+r.id+'\',\'pendiente\')">↩ Pendiente</button>';
        return btns;
    }

    async function chSt(id, status) {
        var result = await db.from('reservations').update({status:status}).eq('id',id);
        if (!result.error) {
            var r = allReservations.find(function(x) { return x.id===id; });
            if (r) r.status = status;
            renderCalendar();
            renderReservas();
            renderHistorico();
            if (selectedDay) renderDayPanel(selectedDay);
        }
    }

    /* UTILS */
    function statusLabel(s) {
        var m = { pendiente:'Pendiente', confirmada:'Confirmada', cancelada:'Cancelada', asistio:'Asistió', no_asistio:'No asistió' };
        return m[s] || s;
    }
    function restoBadge(n) {
        var m = { 'Otitanuz Bar':['rbadge-bar','🥂 Otitanuz Bar'], 'La Hoguera':['rbadge-hog','🔥 La Hoguera'], 'Otitanuz Beach':['rbadge-beach','🏖 Otitanuz Beach'] };
        var v = m[n] || ['','—'];
        return '<span class="rbadge '+v[0]+'">'+v[1]+'</span>';
    }
    function esc(s) { if(!s) return ''; return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
</body>
</html>
